<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testably — Projects (Sparse States)</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #F8FAFC; color: #1E293B; min-height: 100vh; display: flex; flex-direction: column; }

  /* ── Top Header Bar ── */
  .top-header { background: #fff; border-bottom: 1px solid #E2E8F0; display: flex; align-items: center; padding: 0 1.5rem; height: 3.5rem; gap: 1.5rem; flex-shrink: 0; }
  .header-logo { display: flex; align-items: center; gap: 0.5rem; margin-right: 1rem; }
  .logo-icon { width: 28px; height: 28px; background: #6366F1; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #fff; font-size: 0.875rem; }
  .header-logo span { font-weight: 700; color: #0F172A; font-size: 0.9375rem; }
  .header-nav { display: flex; align-items: center; gap: 0; height: 100%; margin-left: 0.5rem; }
  .header-nav-item { display: flex; align-items: center; gap: 0.375rem; padding: 0 0.875rem; height: 100%; font-size: 0.8125rem; color: #64748B; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; font-weight: 500; }
  .header-nav-item:hover { color: #334155; }
  .header-nav-item.active { color: #6366F1; border-bottom-color: #6366F1; }
  .header-nav-item i { font-size: 1rem; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 0.625rem; }
  .header-btn { font-size: 0.75rem; padding: 0.375rem 0.75rem; border-radius: 0.5rem; border: 1px solid #E2E8F0; background: #fff; color: #475569; cursor: pointer; display: flex; align-items: center; gap: 0.375rem; transition: all 0.15s; }
  .header-btn:hover { background: #F1F5F9; }
  .header-avatar { width: 1.75rem; height: 1.75rem; border-radius: 50%; background: #6366F1; display: flex; align-items: center; justify-content: center; font-size: 0.625rem; font-weight: 700; color: #fff; cursor: pointer; }

  /* ── Sub-header ── */
  .sub-header { background: #fff; border-bottom: 1px solid #E2E8F0; display: flex; align-items: center; padding: 0.625rem 1.5rem; gap: 0.75rem; flex-shrink: 0; }
  .sub-title { font-size: 0.9375rem; font-weight: 700; color: #0F172A; }
  .sub-spacer { flex: 1; }
  .sub-btn { font-size: 0.75rem; padding: 0.375rem 0.75rem; border-radius: 9999px; border: 1px solid #E2E8F0; background: #fff; color: #475569; cursor: pointer; display: flex; align-items: center; gap: 0.375rem; transition: all 0.15s; }
  .sub-btn:hover { background: #F1F5F9; }
  .sub-btn.primary { background: #6366F1; color: #fff; border-color: #6366F1; }
  .sub-btn.primary:hover { background: #4F46E5; }
  .sort-group { display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; color: #64748B; }
  .sort-select { font-size: 0.75rem; padding: 0.25rem 0.5rem; border-radius: 0.375rem; border: 1px solid #E2E8F0; background: #fff; color: #334155; cursor: pointer; font-family: inherit; }
  .search-input { font-size: 0.75rem; padding: 0.375rem 0.75rem 0.375rem 2rem; border-radius: 0.5rem; border: 1px solid #E2E8F0; background: #fff; color: #334155; outline: none; width: 200px; transition: border-color 0.15s; font-family: inherit; }
  .search-input:focus { border-color: #6366F1; }
  .search-wrapper { position: relative; }
  .search-wrapper i { position: absolute; left: 0.625rem; top: 50%; transform: translateY(-50%); font-size: 0.875rem; color: #94A3B8; }

  /* ── Content ── */
  .content { flex: 1; padding: 1.5rem; overflow-y: auto; }
  .content-inner { max-width: 1200px; margin: 0 auto; }

  /* ── Project Grid ── */
  .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(480px, 1fr)); gap: 1rem; }

  /* ── Project Card ── */
  .project-card { background: #fff; border: 1px solid #E2E8F0; border-radius: 0.75rem; padding: 1.25rem; cursor: pointer; transition: all 0.2s ease; }
  .project-card:hover { border-color: #C7D2FE; box-shadow: 0 4px 16px rgba(99,102,241,0.08); transform: translateY(-1px); }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 0.375rem; }
  .card-title-row { display: flex; align-items: center; gap: 0.5rem; }
  .card-icon { width: 2rem; height: 2rem; border-radius: 0.5rem; background: #EEF2FF; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .card-icon i { font-size: 1rem; color: #6366F1; }
  .card-name { font-size: 0.9375rem; font-weight: 600; color: #0F172A; }
  .health-badge { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.25rem 0.625rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; flex-shrink: 0; }
  .health-green { background: #F0FDF4; color: #16A34A; }
  .health-green .health-dot { background: #16A34A; }
  .health-yellow { background: #FFFBEB; color: #D97706; }
  .health-yellow .health-dot { background: #D97706; }
  .health-red { background: #FEF2F2; color: #DC2626; }
  .health-red .health-dot { background: #DC2626; }
  .health-gray { background: #F1F5F9; color: #94A3B8; }
  .health-gray .health-dot { background: #94A3B8; }
  .health-dot { width: 6px; height: 6px; border-radius: 50%; }
  .card-desc { font-size: 0.8125rem; color: #64748B; margin: 0.375rem 0 1rem 0; line-height: 1.4; }
  .card-stats { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
  .card-stat { display: flex; align-items: center; gap: 0.3rem; font-size: 0.75rem; color: #64748B; }
  .card-stat i { font-size: 0.875rem; }
  .assigned-badge { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.2rem 0.5rem; border-radius: 9999px; font-size: 0.6875rem; font-weight: 600; background: #EEF2FF; color: #6366F1; }
  .assigned-badge i { font-size: 0.75rem; }
  .card-activity { display: flex; align-items: center; gap: 0.375rem; font-size: 0.75rem; color: #94A3B8; padding-top: 0.75rem; border-top: 1px solid #F1F5F9; }
  .card-activity .activity-avatar { width: 1.25rem; height: 1.25rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.5rem; font-weight: 700; color: #fff; flex-shrink: 0; }
  .card-activity .activity-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .members-stack { display: flex; align-items: center; }
  .member-dot { width: 1.25rem; height: 1.25rem; border-radius: 50%; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 0.4375rem; font-weight: 700; color: #fff; margin-left: -0.3rem; }
  .member-dot:first-child { margin-left: 0; }
  .members-count { font-size: 0.6875rem; color: #94A3B8; margin-left: 0.375rem; }

  /* ── Empty State (0 projects) ── */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem 2rem; text-align: center; }
  .empty-icon { width: 5rem; height: 5rem; border-radius: 1.25rem; background: linear-gradient(135deg, #EEF2FF, #E0E7FF); display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; }
  .empty-icon i { font-size: 2.25rem; color: #6366F1; }
  .empty-title { font-size: 1.25rem; font-weight: 700; color: #0F172A; margin-bottom: 0.5rem; }
  .empty-desc { font-size: 0.875rem; color: #64748B; max-width: 24rem; line-height: 1.5; margin-bottom: 2rem; }
  .empty-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }
  .empty-btn { display: flex; align-items: center; gap: 0.5rem; padding: 0.625rem 1.25rem; border-radius: 9999px; font-size: 0.8125rem; font-weight: 600; cursor: pointer; transition: all 0.15s; border: none; font-family: inherit; }
  .empty-btn.primary { background: #6366F1; color: #fff; }
  .empty-btn.primary:hover { background: #4F46E5; }
  .empty-btn.secondary { background: #fff; color: #6366F1; border: 1px solid #C7D2FE; }
  .empty-btn.secondary:hover { background: #EEF2FF; }
  .empty-btn.accent { background: #8B5CF6; color: #fff; }
  .empty-btn.accent:hover { background: #7C3AED; }
  .empty-btn i { font-size: 1rem; }

  /* ── Getting Started Steps (0 projects) ── */
  .getting-started { margin-top: 2.5rem; display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; max-width: 42rem; width: 100%; }
  @media (max-width: 640px) { .getting-started { grid-template-columns: 1fr; } }
  .gs-step { background: #fff; border: 1px solid #E2E8F0; border-radius: 0.75rem; padding: 1.25rem; text-align: left; transition: all 0.2s; cursor: pointer; }
  .gs-step:hover { border-color: #C7D2FE; box-shadow: 0 4px 16px rgba(99,102,241,0.08); transform: translateY(-1px); }
  .gs-step-num { width: 1.75rem; height: 1.75rem; border-radius: 50%; background: #EEF2FF; color: #6366F1; font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; justify-content: center; margin-bottom: 0.75rem; }
  .gs-step-title { font-size: 0.8125rem; font-weight: 600; color: #0F172A; margin-bottom: 0.25rem; }
  .gs-step-desc { font-size: 0.75rem; color: #64748B; line-height: 1.4; }
  .gs-step-icon { font-size: 1.25rem; color: #6366F1; margin-bottom: 0.5rem; }

  /* ── Action Cards (companion to sparse project cards) ── */
  .action-card {
    background: #fff; border: 1.5px dashed #C7D2FE; border-radius: 0.75rem; padding: 1.25rem;
    cursor: pointer; transition: all 0.2s ease; display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center; min-height: 190px;
  }
  .action-card:hover { border-color: #6366F1; background: #FAFAFF; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(99,102,241,0.06); }
  .action-card .ac-icon { width: 2.75rem; height: 2.75rem; border-radius: 0.75rem; display: flex; align-items: center; justify-content: center; margin-bottom: 0.75rem; }
  .action-card .ac-icon i { font-size: 1.25rem; }
  .action-card .ac-title { font-size: 0.8125rem; font-weight: 600; color: #1E293B; margin-bottom: 0.25rem; }
  .action-card .ac-desc { font-size: 0.6875rem; color: #94A3B8; line-height: 1.4; max-width: 200px; }
  .action-card.sample .ac-icon { background: #F5F3FF; }
  .action-card.sample .ac-icon i { color: #8B5CF6; }
  .action-card.invite .ac-icon { background: #ECFDF5; }
  .action-card.invite .ac-icon i { color: #10B981; }
  .action-card.import .ac-icon { background: #FFF7ED; }
  .action-card.import .ac-icon i { color: #F59E0B; }
  .action-card.create .ac-icon { background: #EEF2FF; }
  .action-card.create .ac-icon i { color: #6366F1; }

  /* ── Quick Tips Banner (for 1-2 projects) ── */
  .tips-banner { background: linear-gradient(135deg, #EEF2FF 0%, #F5F3FF 100%); border: 1px solid #E0E7FF; border-radius: 0.75rem; padding: 1.25rem 1.5rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 1rem; }
  .tips-banner .tips-icon { width: 2.5rem; height: 2.5rem; border-radius: 0.625rem; background: #fff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 1px 3px rgba(99,102,241,0.1); }
  .tips-banner .tips-icon i { font-size: 1.25rem; color: #6366F1; }
  .tips-content { flex: 1; }
  .tips-title { font-size: 0.8125rem; font-weight: 600; color: #312E81; margin-bottom: 0.125rem; }
  .tips-desc { font-size: 0.75rem; color: #6366F1; line-height: 1.4; }
  .tips-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
  .tips-btn { font-size: 0.6875rem; padding: 0.375rem 0.75rem; border-radius: 9999px; font-weight: 600; cursor: pointer; transition: all 0.15s; border: none; font-family: inherit; }
  .tips-btn.primary { background: #6366F1; color: #fff; }
  .tips-btn.primary:hover { background: #4F46E5; }
  .tips-btn.ghost { background: transparent; color: #6366F1; }
  .tips-btn.ghost:hover { background: rgba(99,102,241,0.08); }
  .tips-dismiss { background: none; border: none; cursor: pointer; color: #94A3B8; font-size: 1rem; padding: 0.25rem; }
  .tips-dismiss:hover { color: #64748B; }

  /* ── Stat Cards Grid (3+ projects) ── */
  .stat-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; margin-bottom: 1.25rem; }
  .stat-card { background: #fff; border: 1px solid #E2E8F0; border-radius: 0.75rem; padding: 1.25rem; cursor: pointer; transition: all 0.2s ease; position: relative; overflow: hidden; display: flex; flex-direction: column; gap: 0.625rem; }
  .stat-card:hover { border-color: #C7D2FE; box-shadow: 0 4px 16px rgba(99,102,241,0.08); transform: translateY(-1px); }
  .stat-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2.5px; border-radius: 2px 2px 0 0; opacity: 0; transition: opacity 0.2s; }
  .stat-card:hover::after { opacity: 1; }
  .stat-card.sc-indigo::after { background: #6366F1; }
  .stat-card.sc-emerald::after { background: #10B981; }
  .stat-card.sc-amber::after { background: #F59E0B; }
  .stat-card.sc-green::after { background: #16A34A; }
  .stat-card.sc-red::after { background: #EF4444; }
  .stat-card.sc-violet::after { background: #8B5CF6; }

  .sc-top { display: flex; align-items: center; gap: 0.5rem; }
  .sc-icon { width: 2rem; height: 2rem; border-radius: 0.5rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .sc-icon i { font-size: 1rem; }
  .sc-icon.indigo { background: rgba(99,102,241,0.1); color: #6366F1; }
  .sc-icon.emerald { background: rgba(16,185,129,0.1); color: #10B981; }
  .sc-icon.green { background: rgba(22,163,74,0.1); color: #16A34A; }
  .sc-icon.amber { background: rgba(245,158,11,0.1); color: #F59E0B; }
  .sc-icon.red { background: rgba(239,68,68,0.1); color: #EF4444; }
  .sc-icon.violet { background: rgba(139,92,246,0.1); color: #8B5CF6; }
  .sc-label { font-size: 0.6875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #94A3B8; }

  .sc-body { display: flex; align-items: flex-end; justify-content: space-between; flex: 1; }
  .sc-left { display: flex; flex-direction: column; gap: 0.125rem; }
  .sc-value { font-size: 1.75rem; font-weight: 800; color: #0F172A; line-height: 1; letter-spacing: -0.025em; }
  .sc-delta { display: inline-flex; align-items: center; gap: 0.2rem; font-size: 0.6875rem; font-weight: 600; border-radius: 9999px; padding: 0.125rem 0.375rem; }
  .sc-delta.up { color: #16A34A; background: #F0FDF4; }
  .sc-delta.down { color: #DC2626; background: #FEF2F2; }
  .sc-delta.neutral { color: #64748B; background: #F1F5F9; }
  .sc-sub { font-size: 0.6875rem; color: #94A3B8; font-weight: 500; }

  .sc-right { display: flex; align-items: flex-end; }

  /* Sparkline */
  .sc-sparkline { width: 80px; height: 36px; }
  .sc-sparkline .spark-line { fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .sc-sparkline .spark-area { opacity: 0.15; }
  .sc-sparkline.green .spark-line { stroke: #16A34A; }
  .sc-sparkline.green .spark-area { fill: url(#sparkGradGreen); }
  .sc-sparkline.amber .spark-line { stroke: #F59E0B; }
  .sc-sparkline.amber .spark-area { fill: url(#sparkGradAmber); }
  .sc-sparkline.red .spark-line { stroke: #EF4444; }
  .sc-sparkline.red .spark-area { fill: url(#sparkGradRed); }

  /* Progress Ring (Card 3) */
  .sc-ring { position: relative; width: 44px; height: 44px; flex-shrink: 0; }
  .sc-ring svg { transform: rotate(-90deg); }
  .sc-ring .ring-bg { fill: none; stroke: #F1F5F9; stroke-width: 3.5; }
  .sc-ring .ring-fill { fill: none; stroke-width: 3.5; stroke-linecap: round; transition: stroke-dashoffset 1s ease-out; }
  .sc-ring .ring-fill.green { stroke: #16A34A; }
  .sc-ring .ring-fill.amber { stroke: #F59E0B; }
  .sc-ring .ring-fill.red { stroke: #EF4444; }
  .sc-ring-label { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 0.5625rem; font-weight: 700; color: #334155; }

  /* Avatar Stack (Card 4) */
  .sc-avatars { display: flex; align-items: center; }
  .sc-avatar { width: 1.5rem; height: 1.5rem; border-radius: 50%; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 0.4375rem; font-weight: 700; color: #fff; margin-left: -0.5rem; }
  .sc-avatar:first-child { margin-left: 0; }
  .sc-avatar-overflow { width: 1.5rem; height: 1.5rem; border-radius: 50%; border: 2px solid #fff; background: #F1F5F9; display: flex; align-items: center; justify-content: center; font-size: 0.4375rem; font-weight: 700; color: #64748B; margin-left: -0.5rem; }

  /* ── State switcher (demo control) ── */
  .state-switcher { position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%); background: #fff; border: 1px solid #E2E8F0; border-radius: 9999px; padding: 0.375rem; display: flex; gap: 0.25rem; box-shadow: 0 4px 16px rgba(0,0,0,0.08); z-index: 100; }
  .state-btn { font-size: 0.6875rem; padding: 0.375rem 0.875rem; border-radius: 9999px; border: none; background: transparent; color: #64748B; cursor: pointer; font-family: inherit; font-weight: 500; transition: all 0.15s; }
  .state-btn.active { background: #6366F1; color: #fff; }
  .state-btn:hover:not(.active) { background: #F1F5F9; }

  /* ── Animations ── */
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes sparkDraw { from { stroke-dashoffset: 200; } to { stroke-dashoffset: 0; } }
  .project-card, .action-card { animation: fadeInUp 0.4s ease-out backwards; }
  .project-card:nth-child(1), .action-card:nth-child(1) { animation-delay: 0s; }
  .project-card:nth-child(2), .action-card:nth-child(2) { animation-delay: 0.05s; }
  .project-card:nth-child(3), .action-card:nth-child(3) { animation-delay: 0.1s; }
  .project-card:nth-child(4), .action-card:nth-child(4) { animation-delay: 0.15s; }
  .stat-card { animation: fadeInUp 0.3s ease-out backwards; }
  .stat-card:nth-child(1) { animation-delay: 0s; }
  .stat-card:nth-child(2) { animation-delay: 0.05s; }
  .stat-card:nth-child(3) { animation-delay: 0.1s; }
  .stat-card:nth-child(4) { animation-delay: 0.15s; }
  .empty-state { animation: fadeIn 0.5s ease-out; }
  .tips-banner { animation: fadeInUp 0.4s ease-out; }

  /* ── Responsive ── */
  @media (max-width: 1023px) {
    .projects-grid { grid-template-columns: repeat(2, 1fr); }
    .stat-cards { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 767px) {
    .projects-grid { grid-template-columns: 1fr; }
    .stat-cards { grid-template-columns: repeat(2, 1fr); gap: 0.5rem; }
    .stat-card { padding: 0.75rem; }
    .sc-value { font-size: 1.375rem; }
    .sub-header { flex-wrap: wrap; }
    .search-input { width: 100%; }
    .tips-banner { flex-direction: column; text-align: center; }
    .tips-actions { justify-content: center; }
  }
</style>
</head>
<body>

  <!-- Top Header -->
  <header class="top-header">
    <div class="header-logo">
      <div class="logo-icon">T</div>
      <span>Testably</span>
    </div>
    <nav class="header-nav">
      <div class="header-nav-item active"><i class="ri-folder-3-line"></i> Projects</div>
      <div class="header-nav-item"><i class="ri-team-line"></i> Team</div>
      <div class="header-nav-item"><i class="ri-settings-3-line"></i> Settings</div>
    </nav>
    <div class="header-right">
      <div class="header-btn"><i class="ri-command-line"></i> ⌘K</div>
      <div class="header-btn"><i class="ri-notification-3-line"></i></div>
      <div class="header-avatar">KJ</div>
    </div>
  </header>

  <!-- Sub-header -->
  <div class="sub-header">
    <span class="sub-title">Projects</span>
    <span class="sub-spacer"></span>
    <div class="search-wrapper">
      <i class="ri-search-line"></i>
      <input type="text" class="search-input" placeholder="Search projects..." />
    </div>
    <div class="sort-group">
      <span>Sort:</span>
      <select class="sort-select">
        <option>Last Activity</option>
        <option>Name A-Z</option>
        <option>Health (worst first)</option>
        <option>Created Date</option>
      </select>
    </div>
    <div class="sub-btn primary"><i class="ri-add-line"></i> New Project</div>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="content-inner" id="mainContent"></div>
  </div>

  <!-- State Switcher (demo) -->
  <div class="state-switcher">
    <button class="state-btn active" onclick="setState(0)">0 Projects</button>
    <button class="state-btn" onclick="setState(1)">1 Project</button>

// ── Sparkline SVG builder ──
function buildSparkline(data, colorClass) {
  const w = 80, h = 36, pad = 2;
  const min = Math.min(...data) - 2, max = Math.max(...data) + 2;
  const points = data.map((v, i) => {
    const x = pad + (i / (data.length - 1)) * (w - pad * 2);
    const y = pad + (1 - (v - min) / (max - min)) * (h - pad * 2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const linePath = `M${points.join(" L")}`;
  const areaPath = `${linePath} L${(w - pad).toFixed(1)},${h} L${pad},${h} Z`;
  const gradId = colorClass === "green" ? "sparkGradGreen" : colorClass === "amber" ? "sparkGradAmber" : "sparkGradRed";
  return `<svg class="sc-sparkline ${colorClass}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <path class="spark-area" d="${areaPath}"/>
    <path class="spark-line" d="${linePath}" style="stroke-dasharray:200;stroke-dashoffset:200;animation:sparkDraw 0.8s 0.3s ease-out forwards"/>
  </svg>`;
}

// ── Progress Ring builder ──
function buildProgressRing(pct) {
  const r = 18, circ = 2 * Math.PI * r;
  const offset = circ * (1 - pct / 100);
  const color = pct >= 90 ? "green" : pct >= 70 ? "amber" : "red";
  return `<div class="sc-ring">
    <svg width="44" height="44" viewBox="0 0 44 44">
      <circle class="ring-bg" cx="22" cy="22" r="${r}"/>
      <circle class="ring-fill ${color}" cx="22" cy="22" r="${r}" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${circ.toFixed(1)}" data-target="${offset.toFixed(1)}"/>
    </svg>
    <span class="sc-ring-label" data-countup="${pct}" data-suffix="%">0%</span>
  </div>`;
}

// ── CountUp animation ──
function animateCountUps() {
  document.querySelectorAll('[data-countup]').forEach(el => {
    const target = parseFloat(el.dataset.countup);
    const decimals = parseInt(el.dataset.decimals || '0');
    const suffix = el.dataset.suffix || '';
    const duration = 600;
    const start = performance.now();

    function tick(now) {
      const progress = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - progress, 3); // easeOutCubic
      const current = target * ease;
      if (decimals > 0) {
        el.textContent = current.toFixed(decimals) + suffix;
      } else {
        el.textContent = Math.round(current).toLocaleString() + suffix;
      }
      if (progress < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  });
}

// ── Progress ring animation ──
function animateRings() {
  document.querySelectorAll('.ring-fill[data-target]').forEach(circle => {

}

    const btnCount = parseInt(btn.getAttribute('onclick').match(/\d+/)[0]);
    btn.classList.toggle('active', btnCount === count);
  });

  if (count === 0) {
    main.innerHTML = renderEmptyState();
    return;
  }

  // 1+ projects: always show stat cards + tips banner (1-2) + project grid
  const allProjects = count >= 3
    ? [...sampleProjects, ...extraProjects].slice(0, count)
    : sampleProjects.slice(0, count);

  const tipsBanner = count <= 2 ? renderTipsBanner(count) : '';

  main.innerHTML = `
    ${renderStatCards()}
    ${tipsBanner}
    <div class="projects-grid">
      ${projectCards}
      ${actionCards}

  // Trigger animations after DOM insert

    animateCountUps();

  });
}
