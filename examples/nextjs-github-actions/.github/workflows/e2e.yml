name: E2E (Playwright → Testably)

# Runs Playwright tests on every PR, uploads results to Testably when the
# suite finishes. CI exit code is NOT coupled to upload success by default —
# see `failOnUploadError` in playwright.config.ts.

on:
  pull_request:
    branches: [main]
  # Uncomment to also run on direct pushes to main:
  # push:
  #   branches: [main]

jobs:
  e2e:
    name: Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          # All three are required. Configure under
          # Settings → Secrets and variables → Actions.
          TESTABLY_URL: ${{ secrets.TESTABLY_URL }}
          TESTABLY_TOKEN: ${{ secrets.TESTABLY_TOKEN }}
          TESTABLY_RUN_ID: ${{ secrets.TESTABLY_RUN_ID }}
        run: npx playwright test

      - name: Upload Playwright HTML report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
