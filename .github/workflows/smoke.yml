name: Smoke Tests

on:
  schedule:
    # Every 15 minutes around the clock
    - cron: '*/15 * * * *'
  # Allow manual trigger for debugging
  workflow_dispatch:

jobs:
  smoke:
    name: Run smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests
        env:
          SMOKE_BASE_URL: ${{ vars.SMOKE_BASE_URL || 'https://testably.app' }}
          SMOKE_TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
          SMOKE_PROJECT_ID: ${{ secrets.SMOKE_PROJECT_ID }}
        run: npx playwright test --reporter=github

      - name: Ping BetterStack heartbeat on success
        if: success()
        run: |
          if [ -n "$BETTERSTACK_HEARTBEAT_URL" ]; then
            curl -s -o /dev/null "$BETTERSTACK_HEARTBEAT_URL"
          fi
        env:
          BETTERSTACK_HEARTBEAT_URL: ${{ secrets.BETTERSTACK_HEARTBEAT_URL }}

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7
