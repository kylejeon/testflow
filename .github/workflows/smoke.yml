name: Smoke Tests

on:
  schedule:
    # Every 30 minutes. NOTE: GitHub Actions scheduled workflows in low-activity
    # repos experience 30–90+ min delays and occasional ghost runs (queued but
    # never assigned a runner). This is a known GitHub limitation.
    #
    # ⚠️  BetterStack Heartbeat must be set to:
    #       Period:       60 minutes
    #       Grace period: 120 minutes  (= 180 min total window)
    # Observed worst-case gap between cron runs: ~190 min (GitHub scheduler
    # deprioritises inactive repos overnight). The push trigger covers active
    # deploy windows; the grace period covers overnight cron gaps.
    - cron: '*/30 * * * *'
  # Push to main also triggers smoke — ensures every deploy is validated
  # and provides a reliable heartbeat ping after each code change.
  push:
    branches:
      - main
  # Allow manual trigger for debugging / incident recovery
  workflow_dispatch:

jobs:
  smoke:
    name: Run smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests
        env:
          SMOKE_BASE_URL: ${{ vars.SMOKE_BASE_URL || 'https://testably.app' }}
          SMOKE_TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
          SMOKE_PROJECT_ID: ${{ secrets.SMOKE_PROJECT_ID }}
        run: npx playwright test --reporter=github

      - name: Ping BetterStack heartbeat on success
        if: always()
        run: |
          if [ -n "$BETTERSTACK_HEARTBEAT_URL" ]; then
            # --retry 3: handles transient network errors silently hiding with -s -o /dev/null
            # -w: print HTTP status so CI log shows if BetterStack returned non-2xx
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --retry 3 --retry-delay 5 --retry-connrefused \
              "$BETTERSTACK_HEARTBEAT_URL")
            echo "BetterStack heartbeat HTTP status: $HTTP_STATUS"
            if [[ "$HTTP_STATUS" != 2* ]]; then
              echo "::warning::BetterStack heartbeat returned $HTTP_STATUS"
            fi
          else
            echo "BETTERSTACK_HEARTBEAT_URL not set — skipping heartbeat ping"
          fi
        env:
          BETTERSTACK_HEARTBEAT_URL: ${{ secrets.BETTERSTACK_HEARTBEAT_URL }}

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7
