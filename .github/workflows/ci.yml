name: CI

on:
  pull_request:
    branches:
      - main
      - claude
  push:
    branches:
      - claude

jobs:
  check:
    name: Type check + test + i18n scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test -- --run

      - name: i18n scan — hardcoded strings (fail on match)
        run: npm run scan:i18n:check

      - name: i18n scan — en/ko key parity
        run: npm run scan:i18n:parity

      - name: Build
        run: npm run build
